    <main>
      <!-- Hero: full-screen photo, video on scroll -->
      <div class="video-hero">
        <section class="hero-photo" data-nav-theme="dark" aria-label="Home">
          <div class="hero-photo-track">

              src="https://res.cloudinary.com/dxefd3n1k/image/upload/v1776178453/220412_Orange_V02-4_zbh3pt.jpg"
              alt="Katharina Ludwig in an orange scarf and grey coat, posed in a field at sunset"
              loading="eager"
              decoding="async" />
          </div>
          <div class="hero-photo-ui">
            <div class="name-overlay">
              <a href="about.html" class="animated-name">KATHARINA LUDWIG</a>

              src="https://player.vimeo.com/video/1119756899?h=78d9df9f4f&amp;badge=0&amp;autoplay=1&amp;autopause=0&amp;controls=0&amp;loop=1&amp;background=1&amp;player_id=0&amp;app_id=58479&amp;dnt=1"
              frameborder="0"
              allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
              referrerpolicy="strict-origin-when-cross-origin"

    <script src="common-navigation.js"></script>
    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
      const scrollDownBtn = document.querySelector(".hero-scroll-down");
      const heroVideo = document.getElementById("hero-video");
      const heroPhoto = document.querySelector(".hero-photo");
      const heroPhotoTrack = document.querySelector(".hero-photo-track");
      const heroPhotoUi = document.querySelector(".hero-photo-ui");
      const heroPhotoImage = document.querySelector(".hero-photo__image");
      const desktopMq = window.matchMedia("(min-width: 769px)");

      if (scrollDownBtn && heroVideo) {
        scrollDownBtn.addEventListener("click", function () {
          heroVideo.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }

      function setHeroPhotoHeight() {
        if (!heroPhoto || !heroPhotoImage) {
          return;
        }

        if (!desktopMq.matches) {
          heroPhoto.style.minHeight = "";
          if (heroPhotoTrack) {
            heroPhotoTrack.style.height = "";
          }
          return;
        }

        if (heroPhotoImage.complete && heroPhotoImage.naturalHeight > 0) {
          const fullHeight = heroPhotoImage.offsetHeight;
          const visibleHeight = fullHeight * 0.75;
          if (heroPhotoTrack) {
            heroPhotoTrack.style.height = visibleHeight + "px";
          }
          heroPhoto.style.minHeight = Math.max(visibleHeight, window.innerHeight) + "px";
        }
      }

      function updateHeroPhotoUiPosition() {
        if (!heroPhoto || !heroPhotoUi) {
          return;
        }

        if (!desktopMq.matches) {
          heroPhotoUi.classList.remove("is-at-end");
          return;
        }

        const uiHeight = heroPhotoUi.offsetHeight || window.innerHeight;
        const photoBottom = heroPhoto.getBoundingClientRect().bottom;
        heroPhotoUi.classList.toggle("is-at-end", photoBottom <= uiHeight);
      }

      function refreshHeroPhotoLayout() {
        setHeroPhotoHeight();
        updateHeroPhotoUiPosition();
      }

      if (heroPhoto && heroPhotoImage) {
        let layoutTicking = false;
        function scheduleLayoutUpdate() {
          if (layoutTicking) {
            return;
          }
          layoutTicking = true;
          requestAnimationFrame(function () {
            layoutTicking = false;
            updateHeroPhotoUiPosition();
          });
        }

        heroPhotoImage.addEventListener("load", refreshHeroPhotoLayout);
        refreshHeroPhotoLayout();
        window.addEventListener("scroll", scheduleLayoutUpdate, { passive: true });
        window.addEventListener("resize", refreshHeroPhotoLayout);
        desktopMq.addEventListener("change", refreshHeroPhotoLayout);
        window.addEventListener("load", refreshHeroPhotoLayout);
      }

      // Wait for Vimeo Player API to load
      window.addEventListener("load", function () {
        const iframe = document.querySelector(".video-container iframe");
        const videoContainer = document.querySelector(".video-container");

        if (iframe && typeof Vimeo !== "undefined") {
          const player = new Vimeo.Player(iframe);
          let videoReady = false;

          // Wait for video to be ready
          player
            .ready()
            .then(function () {
              // Wait for video to actually start playing
              player
                .play()
                .then(function () {
                  // Video is playing, now fade it in smoothly
                  setTimeout(function () {
                    if (!videoReady) {
                      videoReady = true;
                      videoContainer.classList.add("video-loaded");
                    }
                  }, 800);
                })
                .catch(function (playError) {
                  // If play fails, still show video after delay
                  console.log("Play error (may be autoplay restriction):", playError);
                  setTimeout(function () {
                    if (!videoReady) {
                      videoReady = true;
                      videoContainer.classList.add("video-loaded");
                    }
                  }, 2000);
                });

              // Also listen for play event as backup
              player.on("play", function () {
                setTimeout(function () {
                  if (!videoReady) {
                    videoReady = true;
                    videoContainer.classList.add("video-loaded");
                  }
                }, 800);
              });
            })
            .catch(function (error) {
              // If there's an error, still show the video after a timeout
              console.error("Vimeo player error:", error);
              setTimeout(function () {
                if (!videoReady) {
                  videoReady = true;
                  videoContainer.classList.add("video-loaded");
                }
              }, 3000);
            });
        } else {
          // Fallback: show video after timeout if API doesn't load
          setTimeout(function () {
            if (videoContainer) {
              videoContainer.classList.add("video-loaded");
            }
          }, 3000);
        }
      });
    </script>
  </body>
